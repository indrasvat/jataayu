name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so PRs don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the Xcode channel so cache keys stay stable across runs. Bumps
  # safely invalidate DerivedData via the xcode-build hash below.
  XCODE_VERSION: latest-stable

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint — fast feedback, runs in parallel with everything else.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: make lint
        run: make lint

  # ────────────────────────────────────────────────────────────────────
  # JoolsKit — pure Swift package. Runs in parallel with everything.
  # ────────────────────────────────────────────────────────────────────
  joolskit:
    name: JoolsKit (build + test)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            JoolsKit/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('JoolsKit/Package.resolved', 'JoolsKit/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: make kit-build
        run: make kit-build

      - name: make kit-test
        run: make kit-test

  # ────────────────────────────────────────────────────────────────────
  # iOS build — compile app + tests ONCE, cache DerivedData across
  # runs, upload the build products (including an `.xctestrun` and a
  # `ci-destination-name.txt` metadata file) as an artifact that the
  # two downstream test jobs consume.
  #
  # The simulator destination is discovered dynamically via
  # `make ci-discover-destination` (which reads `xcodebuild
  # -showdestinations`), so this workflow never hardcodes an iPhone
  # model name — it automatically adapts as GitHub's macos-15 image
  # churns its simulator lineup.
  # ────────────────────────────────────────────────────────────────────
  ios-build:
    name: iOS (build-for-testing)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve Xcode build version
        id: xcode-version
        run: |
          xcodebuild -version
          # Hash the Xcode build number into cache keys so an Xcode
          # bump safely invalidates DerivedData. Otherwise stale module
          # artifacts from the old compiler produce link errors.
          XCODE_BUILD=$(xcodebuild -version | awk '/Build version/ {print $3}')
          echo "build=$XCODE_BUILD" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install xcodegen

      - name: make generate
        run: make generate

      - name: Discover simulator destination
        id: sim
        run: |
          SIM_NAME=$(make -s ci-discover-destination)
          if [ -z "$SIM_NAME" ]; then
            echo "::error::ci-discover-destination returned empty name"
            exit 1
          fi
          echo "name=$SIM_NAME" >> "$GITHUB_OUTPUT"
          echo "Discovered simulator: $SIM_NAME"

      - name: Cache DerivedData (incremental Swift builds)
        uses: actions/cache@v4
        with:
          path: .ci-build
          # Swap on any source / manifest change. The `restore-keys`
          # fallback lets Swift do a fast incremental rebuild even on
          # a partial hit (it diffs module hashes internally).
          key: ${{ runner.os }}-xcode${{ steps.xcode-version.outputs.build }}-dd-${{ hashFiles('Jools/**/*.swift', 'JoolsKit/Sources/**/*.swift', 'JoolsTests/**/*.swift', 'JoolsUITests/**/*.swift', 'JoolsKit/Package.resolved', 'project.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcode${{ steps.xcode-version.outputs.build }}-dd-

      - name: make ci-build-for-testing
        env:
          SIM_NAME: ${{ steps.sim.outputs.name }}
        run: make ci-build-for-testing SIM_NAME="$SIM_NAME"

      - name: make ci-package-build
        run: make ci-package-build

      - name: Upload build-products artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-products
          path: build-products.tar
          retention-days: 1
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────
  # iOS unit tests — downloads the shared build artifact and runs
  # JoolsTests only via `make ci-test-unit`, which reads the
  # simulator name from the metadata file packed by the build job.
  # ────────────────────────────────────────────────────────────────────
  ios-test-unit:
    name: iOS unit tests (JoolsTests)
    runs-on: macos-15
    timeout-minutes: 10
    needs: [ios-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Download build-products artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build-products

      - name: make ci-unpack-build
        run: make ci-unpack-build

      - name: make ci-test-unit
        run: make ci-test-unit

  # ────────────────────────────────────────────────────────────────────
  # iOS UI tests — same shared artifact, targets JoolsUITests.
  # Runs in parallel with ios-test-unit so wall time is
  # max(unit, ui), not unit + ui.
  # ────────────────────────────────────────────────────────────────────
  ios-test-ui:
    name: iOS UI tests (JoolsUITests)
    runs-on: macos-15
    timeout-minutes: 15
    needs: [ios-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Download build-products artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build-products

      - name: make ci-unpack-build
        run: make ci-unpack-build

      - name: make ci-test-ui
        run: make ci-test-ui
