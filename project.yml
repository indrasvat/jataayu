name: Jools
options:
  bundleIdPrefix: com.indrasvat
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.1"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  JoolsKit:
    path: JoolsKit

targets:
  Jools:
    type: application
    platform: iOS
    sources:
      - path: Jools
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: JoolsKit
    postBuildScripts:
      - name: Inject Build Metadata
        script: |
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          /usr/libexec/PlistBuddy -c "Delete :JOOLS_GIT_SHA" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Delete :JOOLS_GIT_BRANCH" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Delete :JOOLS_BUILD_DATE" "$INFO_PLIST" >/dev/null 2>&1 || true

          /usr/libexec/PlistBuddy -c "Add :JOOLS_GIT_SHA string $GIT_SHA" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :JOOLS_GIT_BRANCH string $GIT_BRANCH" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :JOOLS_BUILD_DATE string $BUILD_DATE" "$INFO_PLIST"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.indrasvat.jools
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  JoolsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JoolsTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Jools
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Jools.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Jools"
        BUNDLE_LOADER: "$(TEST_HOST)"

  JoolsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JoolsUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Jools
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Jools
